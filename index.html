<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gas Data Monitor - Real-time Dashboard</title>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      margin-bottom: 30px;
      animation: slideDown 0.5s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .status-indicator {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ccc;
      animation: pulse 2s infinite;
      transition: background 0.3s;
    }

    .status-indicator.connected {
      background: #10b981;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    .header-info {
      display: flex;
      gap: 30px;
      margin-top: 15px;
      font-size: 14px;
      color: #666;
    }

    .header-info div {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .controls {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      margin-bottom: 30px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    label {
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }

    input, button {
      padding: 12px 15px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
      font-family: inherit;
    }

    input {
      background: white;
      color: #333;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .button-group {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .data-card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      border-left: 5px solid #667eea;
      animation: fadeIn 0.5s ease-out;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .data-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
    }

    .data-card h3 {
      color: #333;
      margin-bottom: 15px;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .metric {
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid #f3f4f6;
    }

    .metric:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .metric-label {
      color: #999;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .metric-value {
      font-size: 28px;
      font-weight: bold;
      color: #667eea;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .metric-unit {
      font-size: 14px;
      color: #999;
    }

    .log-container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .log-section {
      display: flex;
      flex-direction: column;
    }

    .log-section h3 {
      color: #333;
      margin-bottom: 15px;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .log-box {
      background: #f8f9fa;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 15px;
      height: 300px;
      overflow-y: auto;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      color: #333;
      line-height: 1.6;
    }

    .log-entry {
      padding: 8px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-time {
      color: #999;
      min-width: 60px;
      font-weight: 600;
    }

    .log-message {
      flex: 1;
      color: #333;
      word-break: break-word;
    }

    .log-type-success {
      color: #10b981;
    }

    .log-type-error {
      color: #ef4444;
    }

    .log-type-info {
      color: #3b82f6;
    }

    .empty-state {
      color: #999;
      text-align: center;
      padding: 40px 20px;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-badge.status-good {
      background: #d1fae5;
      color: #065f46;
    }

    .status-badge.status-warning {
      background: #fef3c7;
      color: #92400e;
    }

    .status-badge.status-critical {
      background: #fee2e2;
      color: #991b1b;
    }

    .data-source-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 8px;
    }

    .data-source-badge.hardware {
      background: #dbeafe;
      color: #1e40af;
    }

    .data-source-badge.api {
      background: #e0e7ff;
      color: #3730a3;
    }

    .timestamp {
      color: #999;
      font-size: 12px;
      margin-top: 10px;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    @media (max-width: 768px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .log-container {
        grid-template-columns: 1fr;
      }

      .data-grid {
        grid-template-columns: 1fr;
      }

      .data-grid.full-width {
        grid-template-columns: 1fr;
      }

      .button-group {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <h1>
        <span class="status-indicator" id="statusIndicator"></span>
        Gas Data Monitoring Dashboard
      </h1>
      <div class="header-info">
        <div>
          <span>Server:</span>
          <strong id="serverStatus">Disconnected</strong>
        </div>
        <div>
          <span>Client ID:</span>
          <strong id="clientId">-</strong>
        </div>
        <div>
          <span>Last Update:</span>
          <strong id="lastUpdate">-</strong>
        </div>
        <div>
          <span>Total Events:</span>
          <strong id="eventCount">0</strong>
        </div>
      </div>
    </header>

    <!-- Controls -->
    <div class="controls">
      <div class="control-group">
        <label for="apiUrl">API URL (for fetching data)</label>
        <input type="text" id="apiUrl" placeholder="https://api.example.com/gas-data" value="https://api.example.com/gas-data">
      </div>
      <div class="control-group">
        <label for="refreshInterval">Auto-Refresh Interval (ms)</label>
        <input type="number" id="refreshInterval" placeholder="5000" value="5000" min="1000">
      </div>
      <div class="button-group">
        <button onclick="fetchGasDataAPI()">📡 Fetch from API</button>
        <button onclick="sendTestData()">🔬 Send Test Data</button>
      </div>
    </div>

    <!-- Data Display Cards -->
    <div class="data-grid" id="dataGrid">
      <div class="empty-state">⏳ Waiting for data... Connect to the server and fetch data to see readings.</div>
    </div>

    <!-- Logs -->
    <div class="log-container">
      <div class="log-section">
        <h3>🔌 Connection Logs</h3>
        <div class="log-box" id="connectionLog">
          <div class="empty-state">🔌 Awaiting connection events...</div>
        </div>
      </div>
      <div class="log-section">
        <h3>📊 Data Logs</h3>
        <div class="log-box" id="dataLog">
          <div class="empty-state">📊 Awaiting data events...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Configuration
    const SERVER_URL = 'http://localhost:3000';
    let socket;
    let eventCount = 0;
    let currentData = null;

    // Initialize Socket.IO connection
    function initializeSocket() {
      socket = io(SERVER_URL, {
        reconnection: true,
        reconnectionDelay: 1000,
        reconnectionDelayMax: 5000,
        reconnectionAttempts: 5
      });

      // Connection events
      socket.on('connect', () => {
        updateConnectionStatus('Connected', true);
        addConnectionLog('✅ Connected to server', 'success');
      });

      socket.on('disconnect', () => {
        updateConnectionStatus('Disconnected', false);
        addConnectionLog('❌ Disconnected from server', 'error');
      });

      socket.on('connected', (data) => {
        document.getElementById('clientId').textContent = data.clientId;
        addConnectionLog(`📌 Client ID: ${data.clientId}`, 'info');
        addConnectionLog(`Message: ${data.message}`, 'info');
      });

      // Data events
      socket.on('gas-data-update', (data) => {
        eventCount++;
        document.getElementById('eventCount').textContent = eventCount;
        currentData = data;
        updateLastUpdate();
        displayGasData(data);
        addDataLog(`📊 Data received from ${data.source}`, 'info', data);
      });

      socket.on('fetch-success', (data) => {
        addDataLog('✅ API fetch successful', 'success', data.data);
      });

      socket.on('fetch-error', (data) => {
        addDataLog(`❌ API fetch error: ${data.error}`, 'error');
      });

      // Error handling
      socket.on('error', (error) => {
        addConnectionLog(`⚠️ Socket error: ${error}`, 'error');
      });
    }

    // UI Update Functions
    function updateConnectionStatus(status, isConnected) {
      document.getElementById('serverStatus').textContent = status;
      const indicator = document.getElementById('statusIndicator');
      if (isConnected) {
        indicator.classList.add('connected');
      } else {
        indicator.classList.remove('connected');
      }
    }

    function updateLastUpdate() {
      const now = new Date();
      const timeString = now.toLocaleTimeString('en-US', {
        hour12: false,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      document.getElementById('lastUpdate').textContent = timeString;
    }

    function displayGasData(data) {
      const dataGrid = document.getElementById('dataGrid');
      
      if (!data.data || typeof data.data !== 'object') {
        dataGrid.innerHTML = '<div class="empty-state">⚠️ Invalid data format received</div>';
        return;
      }

      let html = '';

      // Main readings card
      const readings = data.data.readings || data.data;
      const units = data.data.units || {};

      html += `
        <div class="data-card">
          <h3>📊 Current Readings</h3>
          ${Object.entries(readings).map(([key, value]) => {
            const unit = units[key] || getDefaultUnit(key);
            const quality = getQualityStatus(key, value);
            return `
              <div class="metric">
                <div class="metric-label">${formatLabel(key)}</div>
                <div class="metric-value">
                  ${typeof value === 'number' ? value.toFixed(2) : value}
                  <span class="metric-unit">${unit}</span>
                </div>
                ${quality ? `<div class="status-badge status-${quality}">${quality.toUpperCase()}</div>` : ''}
              </div>
            `;
          }).join('')}
          <div class="data-source-badge ${data.source}">${data.source.toUpperCase()}</div>
          <div class="timestamp">📅 ${new Date(data.timestamp).toLocaleString()}</div>
        </div>
      `;

      // Sensor info card
      if (data.data.sensorId || data.data.quality) {
        html += `
          <div class="data-card">
            <h3>🔍 Metadata</h3>
            ${data.data.sensorId ? `
              <div class="metric">
                <div class="metric-label">Sensor ID</div>
                <div class="metric-value">${data.data.sensorId}</div>
              </div>
            ` : ''}
            ${data.data.quality ? `
              <div class="metric">
                <div class="metric-label">Quality Status</div>
                <div class="metric-value" style="font-size: 18px;">${data.data.quality.toUpperCase()}</div>
              </div>
            ` : ''}
            <div class="metric">
              <div class="metric-label">Data Source</div>
              <div class="metric-value" style="font-size: 16px;">${data.source}</div>
            </div>
          </div>
        `;
      }

      // Statistics card
      const co2 = readings.co2;
      if (co2) {
        const maxSafe = 500;
        const percentage = (co2 / maxSafe * 100).toFixed(1);
        html += `
          <div class="data-card">
            <h3>📈 CO2 Analysis</h3>
            <div class="metric">
              <div class="metric-label">Current Level</div>
              <div class="metric-value">${co2} <span class="metric-unit">ppm</span></div>
            </div>
            <div class="metric">
              <div class="metric-label">Safe Threshold</div>
              <div class="metric-value">${maxSafe} <span class="metric-unit">ppm</span></div>
            </div>
            <div class="metric">
              <div class="metric-label">Percentage of Max</div>
              <div class="metric-value">${percentage}<span class="metric-unit">%</span></div>
            </div>
          </div>
        `;
      }

      dataGrid.innerHTML = html;
    }

    function getDefaultUnit(key) {
      const unitMap = {
        'co2': 'ppm',
        'temperature': '°C',
        'humidity': '%',
        'pressure': 'hPa',
        'o2': '%',
        'temperature_c': '°C',
        'temperature_f': '°F'
      };
      return unitMap[key.toLowerCase()] || '';
    }

    function getQualityStatus(key, value) {
      const thresholds = {
        'co2': { warning: 500, critical: 1000 }
      };
      
      const threshold = thresholds[key.toLowerCase()];
      if (!threshold) return null;
      
      if (value >= threshold.critical) return 'critical';
      if (value >= threshold.warning) return 'warning';
      return 'good';
    }

    function formatLabel(key) {
      return key
        .replace(/_/g, ' ')
        .replace(/([a-z])([A-Z])/g, '$1 $2')
        .split(' ')
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(' ');
    }

    function addConnectionLog(message, type) {
      const logBox = document.getElementById('connectionLog');
      if (logBox.querySelector('.empty-state')) {
        logBox.innerHTML = '';
      }

      const entry = document.createElement('div');
      entry.className = `log-entry log-type-${type}`;
      entry.innerHTML = `
        <span class="log-time">${new Date().toLocaleTimeString('en-US', { hour12: false })}</span>
        <span class="log-message">${message}</span>
      `;
      logBox.insertBefore(entry, logBox.firstChild);

      // Keep only last 50 entries
      while (logBox.children.length > 50) {
        logBox.removeChild(logBox.lastChild);
      }
    }

    function addDataLog(message, type, data = null) {
      const logBox = document.getElementById('dataLog');
      if (logBox.querySelector('.empty-state')) {
        logBox.innerHTML = '';
      }

      const entry = document.createElement('div');
      entry.className = `log-entry log-type-${type}`;
      let content = `
        <span class="log-time">${new Date().toLocaleTimeString('en-US', { hour12: false })}</span>
        <span class="log-message">${message}`;
      
      if (data && typeof data === 'object') {
        content += `<br><small>${JSON.stringify(data).substring(0, 100)}...</small>`;
      }
      
      content += `</span>`;
      entry.innerHTML = content;
      logBox.insertBefore(entry, logBox.firstChild);

      // Keep only last 50 entries
      while (logBox.children.length > 50) {
        logBox.removeChild(logBox.lastChild);
      }
    }

    function fetchGasDataAPI() {
      const apiUrl = document.getElementById('apiUrl').value;
      if (!apiUrl) {
        alert('Please enter an API URL');
        return;
      }

      addDataLog(`🔄 Requesting API fetch from: ${apiUrl}`, 'info');
      socket.emit('fetch-gas-data', { apiUrl });
    }

    function sendTestData() {
      const testData = {
        sensorId: `sensor-${Math.floor(Math.random() * 1000)}`,
        temperature: (20 + Math.random() * 10).toFixed(2),
        co2: Math.floor(400 + Math.random() * 200),
        humidity: (50 + Math.random() * 30).toFixed(2),
        pressure: (1010 + Math.random() * 10).toFixed(2)
      };

      addDataLog('📤 Sending test data to server...', 'info');
      
      fetch('http://localhost:3000/api/gas-data', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(testData)
      })
      .then(response => response.json())
      .then(result => {
        addDataLog('✅ Test data sent successfully', 'success', testData);
      })
      .catch(error => {
        addDataLog(`❌ Error sending test data: ${error.message}`, 'error');
      });
    }

    // Initialize on page load
    window.addEventListener('load', () => {
      initializeSocket();
    });
  </script>
</body>
</html>
