# DigitalOcean App Platform Configuration
# This file defines how your app will be deployed on DigitalOcean

name: agas-backend

# App Services (your Node.js backend)
services:
  - name: api
    # GitHub repo configuration
    github:
      repo: dannyjy/backend_AGAS
      branch: main
      deploy_on_push: true
    
    # Build configuration
    build_command: npm install
    
    # Run configuration
    run_command: npm start
    
    # Environment
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs
    
    # HTTP configuration
    http_port: 8080
    
    # Health check
    health_check:
      http_path: /
    
    # Environment variables
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: HOST
        value: "0.0.0.0"
      # DATABASE_URL is configured in DigitalOcean App Platform dashboard
      # Do not commit database credentials to Git
    
    # Routes
    routes:
      - path: /
